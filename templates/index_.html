<!DOCTYPE html>
<html>
<head>
    <title>Movie Recommender</title>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(120deg, #1e3c72, #2a5298);
            color: white;
            text-align: center;
            padding: 50px;
        }
        input {
            padding: 10px;
            width: 300px;
            border-radius: 10px;
            border: none;
        }
        button {
            padding: 10px 20px;
            border-radius: 10px;
            border: none;
            background-color: #ff7b00;
            color: white;
            cursor: pointer;
        }
        button:hover {
            background-color: #ff9500;
        }
        .card {
            background: rgba(255,255,255,0.1);
            margin: 10px;
            padding: 15px;
            border-radius: 15p
            display: inline-block;
            transition: transform 0.3s;
        }
        .card:hover {
            transform: scale(1.1);
        }
    </style>
</head>
<body>

    <h1>🎬 Movie Recommender System</h1>

    <form method="POST">
        <input type="text" name="movie" placeholder="Enter movie name" required>
        <button type="submit">Recommend</button>
    </form>

    <h2>Recommendations:</h2>

    {% for movie in recommendations %}
        <div class="card">
            <h3>{{ movie }}</h3>
        </div>
    {% endfor %}

</body>
</html>
